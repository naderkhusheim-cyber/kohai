<svg viewBox="0 0 80 130" xmlns="http://www.w3.org/2000/svg">
  <!-- Cap -->
  <rect x="32" y="2" width="16" height="14" rx="2" fill="#3a5a8a"/>
  <rect x="30" y="14" width="20" height="6" rx="2" fill="#2b4a73"/>
  <!-- Neck -->
  <rect x="34" y="20" width="12" height="10" fill="#cfe7f5" opacity="0.7"/>
  <!-- Body -->
  <rect x="20" y="30" width="40" height="86" rx="10" fill="#cfe7f5" opacity="0.85"/>
  <rect x="20" y="30" width="40" height="86" rx="10" fill="none" stroke="#7ab2d8" stroke-width="1.5"/>
  <!-- Water level -->
  <rect x="24" y="60" width="32" height="52" rx="6" fill="#4a96c9" opacity="0.6"/>
  <!-- Highlight -->
  <rect x="24" y="36" width="6" height="76" rx="3" fill="#fff" opacity="0.5"/>
  <!-- Bottom -->
  <ellipse cx="40" cy="118" rx="20" ry="4" fill="#3a2a1a" opacity="0.3"/>
  <!-- Hand gripping the bottle: skin-tone fingers wrapping front of the bottle.
       Drawn on top so it reads as "she's holding it" even though her actual
       VRM fingers are stub bones that can't curl. -->
  <g fill="#f4d5b8" stroke="#c89a78" stroke-width="0.8">
    <!-- Thumb on the left side, pointing up -->
    <path d="M 16 60 Q 14 56 17 53 Q 22 53 23 60 Q 23 70 20 72 Q 16 72 16 68 Z"/>
    <!-- Four fingers wrapping the front of the bottle, stacked vertically -->
    <rect x="22" y="62" width="22" height="9" rx="4"/>
    <rect x="22" y="72" width="22" height="9" rx="4"/>
    <rect x="22" y="82" width="20" height="9" rx="4"/>
    <rect x="24" y="92" width="16" height="8" rx="4"/>
    <!-- Palm shadow behind fingers -->
    <ellipse cx="32" cy="80" rx="14" ry="22" fill="#e8c4a4" opacity="0.6" stroke="none"/>
  </g>
</svg>
