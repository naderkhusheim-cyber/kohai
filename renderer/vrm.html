<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kohai (VRM)</title>
  <link rel="stylesheet" href="styles.css">
  <script type="importmap">
  {
    "imports": {
      "three":                            "../node_modules/three/build/three.module.js",
      "three/":                           "../node_modules/three/",
      "three/addons/":                    "../node_modules/three/examples/jsm/",
      "@pixiv/three-vrm":                 "../node_modules/@pixiv/three-vrm/lib/three-vrm.module.js",
      "@pixiv/three-vrm-animation":       "../node_modules/@pixiv/three-vrm-animation/lib/three-vrm-animation.module.js"
    }
  }
  </script>
</head>
<body>
  <div class="kohai-container vrm-mode">
    <div class="aura" id="aura"></div>
    <!-- "House" — Kohai's interior. Furniture she actually uses for
         sit / sleep / coding. Sits behind the canvas so she renders on
         top of it. -->
    <div id="house" class="house" aria-hidden="true">
      <!-- Wooden floor strip at the bottom. -->
      <div class="floor"></div>
      <!-- Floor cushion (anchor for sit — sized & positioned where her
           butt actually lands when she crosses her legs). -->
      <svg class="furniture cushion" viewBox="0 0 200 70" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="100" cy="50" rx="92" ry="18" fill="#3a2a1a" opacity="0.45"/>
        <rect x="14" y="14" width="172" height="40" rx="20" fill="#a64a78"/>
        <rect x="22" y="22" width="156" height="22" rx="14" fill="#c66e98"/>
        <circle cx="40" cy="14"  r="3" fill="#fff" opacity="0.7"/>
        <circle cx="100" cy="10" r="3" fill="#fff" opacity="0.7"/>
        <circle cx="160" cy="14" r="3" fill="#fff" opacity="0.7"/>
      </svg>
      <!-- Standing lamp on the right. -->
      <svg class="furniture lamp" viewBox="0 0 60 200" xmlns="http://www.w3.org/2000/svg">
        <rect x="22" y="160" width="16" height="36" fill="#3a2a1a"/>
        <ellipse cx="30" cy="190" rx="20" ry="6" fill="#4a3a26"/>
        <path d="M10 60 L50 60 L42 110 L18 110 Z" fill="#ffd66b" opacity="0.9"/>
        <rect x="28" y="58" width="4" height="2" fill="#3a2a1a"/>
      </svg>
      <!-- Bed (sleep anchor). Small floor cushion + pillow. -->
      <svg class="furniture bed" viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
        <rect x="0"  y="20" width="200" height="56" rx="14" fill="#4d6fa5"/>
        <rect x="8"  y="26" width="184" height="18" rx="8" fill="#c2d3ec"/>
        <rect x="14" y="6"  width="64"  height="22" rx="10" fill="#fff8e7"/>
      </svg>
      <!-- Small potted plant. -->
      <svg class="furniture plant" viewBox="0 0 60 90" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="30" cy="60" rx="20" ry="22" fill="#3a8a52"/>
        <ellipse cx="20" cy="50" rx="9" ry="10" fill="#4ea766"/>
        <ellipse cx="40" cy="48" rx="9" ry="10" fill="#4ea766"/>
        <path d="M14 78 L46 78 L42 90 L18 90 Z" fill="#a86a3a"/>
      </svg>
      <!-- Wooden desk (side view) — appears in front of her when she's in
           side-profile workspace mode. Tabletop + two legs. -->
      <svg class="furniture desk" viewBox="0 0 280 160" xmlns="http://www.w3.org/2000/svg">
        <rect x="0"   y="20" width="280" height="14" rx="3" fill="#8a5a36"/>
        <rect x="0"   y="34" width="280" height="6"  fill="#6a4426"/>
        <rect x="14"  y="40" width="10"  height="118" fill="#6a4426"/>
        <rect x="256" y="40" width="10"  height="118" fill="#6a4426"/>
        <rect x="10"  y="148" width="260" height="6" fill="#3a2a1a" opacity="0.5"/>
      </svg>
      <!-- Office chair — drawn FROM THE SIDE to match the Flow reference
           (high-backed padded backrest on the LEFT, cushioned seat
           extending right, central post, 5-star wheelbase visible from
           the side). When Kohai is in side profile facing right, the
           backrest sits behind her back. CSS mirrors the SVG (scaleX -1)
           when she faces left. -->
      <svg class="furniture chair" viewBox="0 0 320 440" xmlns="http://www.w3.org/2000/svg">
        <!-- Tall padded backrest (LEFT side of SVG). Tilted backward
             ~12° from vertical via a <g rotate> so the chair "leans"
             rather than reading as a stiff T-pose plank. Rotation pivot
             is at the BOTTOM of the backrest where it meets the seat,
             so the top of the backrest swings back (top moves to -x). -->
        <g transform="rotate(-12 70 270)">
          <rect x="38" y="20"  width="62" height="260" rx="28" fill="#3a4a66"/>
          <rect x="46" y="30"  width="46" height="240" rx="20" fill="#5a7295"/>
          <!-- Center seam stripe in warm contrast color. -->
          <rect x="60" y="50"  width="18" height="200" rx="9" fill="#c66a3a" opacity="0.7"/>
          <!-- Highlight band along the top of the backrest. -->
          <rect x="46" y="30"  width="46" height="10" rx="5" fill="#7a92b5"/>
        </g>
        <!-- Armrest bar above the seat. -->
        <rect x="96" y="250" width="74" height="11" rx="5" fill="#3a4a66"/>
        <rect x="98" y="252" width="70" height="4" rx="2" fill="#5a7295"/>
        <!-- Seat cushion — WIDE and prominent so it actually reads as a
             seat she's sitting on. Extends well past where her thighs
             land so the chair looks supportive, not a thin strip. -->
        <rect x="38" y="262" width="256" height="56" rx="22" fill="#3a4a66"/>
        <rect x="48" y="270" width="238" height="40" rx="18" fill="#5a7295"/>
        <!-- Seat top highlight (where the cushion's padding catches light). -->
        <rect x="56" y="272" width="220" height="6" rx="3" fill="#a8b8d8" opacity="0.6"/>
        <!-- Front-edge shadow on the seat. -->
        <rect x="36" y="310" width="260" height="8"  rx="4" fill="#1a2030" opacity="0.55"/>
        <!-- Vertical post (silver/chrome look). -->
        <rect x="154" y="320" width="16" height="68" fill="#8a92a0"/>
        <rect x="156" y="320" width="4"  height="68" fill="#c8cdd6"/>
        <!-- 5-star wheelbase: silver chrome legs + dark rubber wheels. -->
        <ellipse cx="161" cy="400" rx="120" ry="12" fill="#8a92a0"/>
        <ellipse cx="161" cy="398" rx="115" ry="4" fill="#c8cdd6"/>
        <circle cx="50"  cy="418" r="14" fill="#1a1c22" stroke="#6a7280" stroke-width="2"/>
        <circle cx="105" cy="424" r="14" fill="#1a1c22" stroke="#6a7280" stroke-width="2"/>
        <circle cx="161" cy="426" r="14" fill="#1a1c22" stroke="#6a7280" stroke-width="2"/>
        <circle cx="217" cy="424" r="14" fill="#1a1c22" stroke="#6a7280" stroke-width="2"/>
        <circle cx="272" cy="418" r="14" fill="#1a1c22" stroke="#6a7280" stroke-width="2"/>
      </svg>
    </div>
    <canvas id="canvas"></canvas>
    <!-- Hand-held props. Default hidden; shown when container has
         data-prop-<name>="1". Positioned to read as "in her hand" or
         "on her face" without needing actual VRM bone parenting. -->
    <!-- Asset library mount point — kohai_asset() inserts SVGs from
         assets/library/ into this container. Empty by default; populated
         dynamically per scene. -->
    <div id="library-assets" class="library-assets" aria-hidden="true"></div>
    <div id="props" class="props" aria-hidden="true">
      <!-- Pointer stick (teacher-style). Used when her arm can't reach
           the code on the screen — she "extends her reach" with this. -->
      <svg class="prop pointer" viewBox="0 0 16 280" xmlns="http://www.w3.org/2000/svg">
        <rect x="6" y="20" width="4" height="248" fill="#d8b787" stroke="#3a2a1a" stroke-width="1"/>
        <circle cx="8" cy="16" r="7" fill="#ff5252" stroke="#3a2a1a" stroke-width="1"/>
        <rect x="5" y="262" width="6" height="14" rx="2" fill="#3a2a1a"/>
      </svg>
      <!-- Reading glasses. Sit over her eyes for "study mode". -->
      <svg class="prop glasses" viewBox="0 0 120 36" xmlns="http://www.w3.org/2000/svg">
        <circle cx="26" cy="18" r="14" fill="none" stroke="#1a1a1a" stroke-width="3"/>
        <circle cx="94" cy="18" r="14" fill="none" stroke="#1a1a1a" stroke-width="3"/>
        <line x1="40" y1="18" x2="80" y2="18" stroke="#1a1a1a" stroke-width="3"/>
        <line x1="0"  y1="14" x2="12" y2="14" stroke="#1a1a1a" stroke-width="3"/>
        <line x1="108" y1="14" x2="120" y2="14" stroke="#1a1a1a" stroke-width="3"/>
      </svg>
      <!-- Coffee cup. Sits beside her on the floor / desk. -->
      <svg class="prop cup" viewBox="0 0 60 70" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 10 L52 10 L48 60 L12 60 Z" fill="#fff" stroke="#3a2a1a" stroke-width="2"/>
        <path d="M52 18 Q66 22 60 38 Q54 50 48 46" fill="none" stroke="#3a2a1a" stroke-width="3"/>
        <ellipse cx="30" cy="14" rx="20" ry="3" fill="#6b4226"/>
        <path d="M22 0 Q22 -6 26 -6 M30 0 Q30 -8 34 -8" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.7" transform="translate(0,4)"/>
      </svg>
      <!-- Headphones. Sit on top of her head. -->
      <svg class="prop headphones" viewBox="0 0 140 110" xmlns="http://www.w3.org/2000/svg">
        <path d="M14 70 Q14 14 70 14 Q126 14 126 70" fill="none" stroke="#2b2f3a" stroke-width="10"/>
        <rect x="2"   y="56" width="22" height="40" rx="8" fill="#ff5252"/>
        <rect x="116" y="56" width="22" height="40" rx="8" fill="#ff5252"/>
      </svg>
    </div>
    <div id="laptop" class="laptop" aria-hidden="true">
      <svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
        <rect x="14" y="6" width="92" height="58" rx="4" fill="#2b2f3a" stroke="#15171c" stroke-width="2"/>
        <rect x="20" y="12" width="80" height="46" rx="2" fill="#0e1117"/>
        <rect x="24" y="18" width="42" height="2" fill="#7ee787" opacity="0.85"/>
        <rect x="24" y="24" width="56" height="2" fill="#79c0ff" opacity="0.85"/>
        <rect x="24" y="30" width="34" height="2" fill="#ffa657" opacity="0.85"/>
        <rect x="24" y="36" width="64" height="2" fill="#d2a8ff" opacity="0.85"/>
        <rect x="24" y="42" width="48" height="2" fill="#ff7b72" opacity="0.85"/>
        <rect x="24" y="48" width="38" height="2" fill="#7ee787" opacity="0.85"/>
        <rect class="laptop-caret" x="64" y="48" width="2" height="6" fill="#fff"/>
        <path d="M2 64 L118 64 L110 78 L10 78 Z" fill="#3a3f4d" stroke="#15171c" stroke-width="2"/>
        <rect x="48" y="68" width="24" height="3" rx="1" fill="#15171c" opacity="0.6"/>
      </svg>
      <div class="keystrokes" id="keystrokes"></div>
    </div>
    <div class="bubble" id="bubble"></div>
    <div class="loading" id="loading">loading kohai…</div>
  </div>
  <script src="voicevox.js"></script>
  <script type="module" src="vrm-character.js"></script>
</body>
</html>
