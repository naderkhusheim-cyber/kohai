<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kohai (VRM)</title>
  <link rel="stylesheet" href="styles.css">
  <script type="importmap">
  {
    "imports": {
      "three":                            "../node_modules/three/build/three.module.js",
      "three/":                           "../node_modules/three/",
      "three/addons/":                    "../node_modules/three/examples/jsm/",
      "@pixiv/three-vrm":                 "../node_modules/@pixiv/three-vrm/lib/three-vrm.module.js",
      "@pixiv/three-vrm-animation":       "../node_modules/@pixiv/three-vrm-animation/lib/three-vrm-animation.module.js"
    }
  }
  </script>
</head>
<body>
  <div class="kohai-container vrm-mode">
    <div class="aura" id="aura"></div>
    <!-- "House" — Kohai's interior. Furniture she actually uses for
         sit / sleep / coding. Sits behind the canvas so she renders on
         top of it. -->
    <div id="house" class="house" aria-hidden="true">
      <!-- Wooden floor strip at the bottom. -->
      <div class="floor"></div>
      <!-- Floor cushion (anchor for sit — sized & positioned where her
           butt actually lands when she crosses her legs). -->
      <svg class="furniture cushion" viewBox="0 0 200 70" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="100" cy="50" rx="92" ry="18" fill="#3a2a1a" opacity="0.45"/>
        <rect x="14" y="14" width="172" height="40" rx="20" fill="#a64a78"/>
        <rect x="22" y="22" width="156" height="22" rx="14" fill="#c66e98"/>
        <circle cx="40" cy="14"  r="3" fill="#fff" opacity="0.7"/>
        <circle cx="100" cy="10" r="3" fill="#fff" opacity="0.7"/>
        <circle cx="160" cy="14" r="3" fill="#fff" opacity="0.7"/>
      </svg>
      <!-- Standing lamp on the right. -->
      <svg class="furniture lamp" viewBox="0 0 60 200" xmlns="http://www.w3.org/2000/svg">
        <rect x="22" y="160" width="16" height="36" fill="#3a2a1a"/>
        <ellipse cx="30" cy="190" rx="20" ry="6" fill="#4a3a26"/>
        <path d="M10 60 L50 60 L42 110 L18 110 Z" fill="#ffd66b" opacity="0.9"/>
        <rect x="28" y="58" width="4" height="2" fill="#3a2a1a"/>
      </svg>
      <!-- Bed (sleep anchor). Small floor cushion + pillow. -->
      <svg class="furniture bed" viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
        <rect x="0"  y="20" width="200" height="56" rx="14" fill="#4d6fa5"/>
        <rect x="8"  y="26" width="184" height="18" rx="8" fill="#c2d3ec"/>
        <rect x="14" y="6"  width="64"  height="22" rx="10" fill="#fff8e7"/>
      </svg>
      <!-- Small potted plant. -->
      <svg class="furniture plant" viewBox="0 0 60 90" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="30" cy="60" rx="20" ry="22" fill="#3a8a52"/>
        <ellipse cx="20" cy="50" rx="9" ry="10" fill="#4ea766"/>
        <ellipse cx="40" cy="48" rx="9" ry="10" fill="#4ea766"/>
        <path d="M14 78 L46 78 L42 90 L18 90 Z" fill="#a86a3a"/>
      </svg>
      <!-- Office chair (back view — backrest visible behind her shoulders,
           wheelbase at the bottom). Anchor for code_at_desk. -->
      <svg class="furniture chair" viewBox="0 0 240 320" xmlns="http://www.w3.org/2000/svg">
        <!-- backrest -->
        <rect x="60" y="6"   width="120" height="170" rx="22" fill="#2b2f3a"/>
        <rect x="72" y="18"  width="96"  height="146" rx="14" fill="#3a3f4d"/>
        <!-- seat -->
        <rect x="40" y="170" width="160" height="44"  rx="14" fill="#2b2f3a"/>
        <rect x="48" y="174" width="144" height="20"  rx="8"  fill="#3a3f4d"/>
        <!-- post -->
        <rect x="113" y="210" width="14" height="60" fill="#1a1c20"/>
        <!-- wheelbase -->
        <ellipse cx="120" cy="280" rx="80" ry="14" fill="#1a1c20"/>
        <circle cx="60"  cy="296" r="10" fill="#1a1c20"/>
        <circle cx="120" cy="304" r="10" fill="#1a1c20"/>
        <circle cx="180" cy="296" r="10" fill="#1a1c20"/>
      </svg>
    </div>
    <canvas id="canvas"></canvas>
    <div id="laptop" class="laptop" aria-hidden="true">
      <svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
        <rect x="14" y="6" width="92" height="58" rx="4" fill="#2b2f3a" stroke="#15171c" stroke-width="2"/>
        <rect x="20" y="12" width="80" height="46" rx="2" fill="#0e1117"/>
        <rect x="24" y="18" width="42" height="2" fill="#7ee787" opacity="0.85"/>
        <rect x="24" y="24" width="56" height="2" fill="#79c0ff" opacity="0.85"/>
        <rect x="24" y="30" width="34" height="2" fill="#ffa657" opacity="0.85"/>
        <rect x="24" y="36" width="64" height="2" fill="#d2a8ff" opacity="0.85"/>
        <rect x="24" y="42" width="48" height="2" fill="#ff7b72" opacity="0.85"/>
        <rect x="24" y="48" width="38" height="2" fill="#7ee787" opacity="0.85"/>
        <rect class="laptop-caret" x="64" y="48" width="2" height="6" fill="#fff"/>
        <path d="M2 64 L118 64 L110 78 L10 78 Z" fill="#3a3f4d" stroke="#15171c" stroke-width="2"/>
        <rect x="48" y="68" width="24" height="3" rx="1" fill="#15171c" opacity="0.6"/>
      </svg>
      <div class="keystrokes" id="keystrokes"></div>
    </div>
    <div class="bubble" id="bubble"></div>
    <div class="loading" id="loading">loading kohai…</div>
  </div>
  <script src="voicevox.js"></script>
  <script type="module" src="vrm-character.js"></script>
</body>
</html>
